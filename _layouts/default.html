<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --text: #37352f;
      --text-secondary: #787774;
      --bg: #ffffff;
      --border: #e3e2e0;
      --link: #37352f;
      --link-underline: rgba(55, 53, 47, 0.4);
      --hover-bg: #f1f1ef;
      --code-bg: #f7f6f3;
      --code-border: #e3e2e080;
      --table-header-bg: #f7f6f3;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: #ffffffcf;
        --text-secondary: #ffffff5e;
        --bg: #191919;
        --border: #ffffff18;
        --link: #ffffffcf;
        --link-underline: rgba(255, 255, 255, 0.3);
        --hover-bg: #ffffff0e;
        --code-bg: #ffffff0a;
        --code-border: #ffffff12;
        --table-header-bg: #ffffff0a;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
        Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 120px;
    }

    .back {
      display: inline-block;
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 32px;
    }
    .back:hover { color: var(--text); }

    h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px; }
    h2 { font-size: 24px; font-weight: 600; margin-top: 40px; margin-bottom: 4px; }
    h3 { font-size: 20px; font-weight: 600; margin-top: 32px; margin-bottom: 4px; }
    h4 { font-size: 16px; font-weight: 600; margin-top: 24px; margin-bottom: 4px; }

    p { font-size: 16px; margin-bottom: 8px; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 16px;
    }

    a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: var(--link-underline);
      text-underline-offset: 3px;
    }
    a:hover { text-decoration-color: var(--text); }

    ul, ol { padding-left: 24px; margin-bottom: 12px; }
    li { font-size: 16px; margin-bottom: 2px; }

    code {
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 14px;
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 12px 0 16px;
    }
    pre code {
      background: none;
      padding: 0;
      font-size: 13.5px;
      line-height: 1.6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 16px;
      font-size: 15px;
    }
    th {
      text-align: left;
      font-weight: 600;
      background: var(--table-header-bg);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    blockquote {
      border-left: 3px solid var(--border);
      padding-left: 16px;
      color: var(--text-secondary);
      margin: 12px 0;
    }

    strong { font-weight: 600; }

    .footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 14px;
    }
    .footer a { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="{{ '/' | relative_url }}">← 返回首页</a>
    {{ content }}
    <div class="footer">
      <a href="https://github.com/jiamangu/human-on-the-loop" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
