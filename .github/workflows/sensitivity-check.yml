name: Sensitivity Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  sensitivity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD 2>/dev/null || git ls-files)
          fi

          if [ -z "$FILES" ]; then
            echo "no_files=true" >> "$GITHUB_OUTPUT"
          else
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "files<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Credential scan
        if: steps.changed.outputs.no_files != 'true'
        run: |
          FOUND=0

          declare -A PATTERNS
          PATTERNS["Slack token"]='(xoxb|xoxp|xoxs|xoxa)-[0-9a-zA-Z-]+'
          PATTERNS["OpenAI/Anthropic key"]='sk-[a-zA-Z0-9]{20,}'
          PATTERNS["GitHub PAT"]='ghp_[a-zA-Z0-9]{36}'
          PATTERNS["GitHub App token"]='ghs_[a-zA-Z0-9]{36}'
          PATTERNS["AWS Access Key ID"]='AKIA[0-9A-Z]{16}'
          PATTERNS["Google API Key"]='AIza[0-9A-Za-z_-]{35}'
          PATTERNS["Password assignment"]='(?i)(password|passwd|pwd)\s*[:=]\s*\S+'
          PATTERNS["API key assignment"]='(?i)(api[_-]?key|apikey)\s*[:=]\s*\S+'
          PATTERNS["Secret key assignment"]="(?i)(secret[_-]?key|secret)\s*[:=]\s*[\"'][^\"']+"
          PATTERNS["Bearer token"]='(?i)bearer\s+[a-zA-Z0-9._-]{20,}'
          PATTERNS["Private key"]='-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            # Skip binary files and the workflow itself
            if file "$file" | grep -q "binary"; then
              continue
            fi
            if [ "$file" = ".github/workflows/sensitivity-check.yml" ]; then
              continue
            fi

            for label in "${!PATTERNS[@]}"; do
              pattern="${PATTERNS[$label]}"
              MATCHES=$(grep -nP "$pattern" "$file" 2>/dev/null || true)
              if [ -n "$MATCHES" ]; then
                while IFS= read -r match; do
                  LINE_NUM=$(echo "$match" | cut -d: -f1)
                  echo "::error file=${file},line=${LINE_NUM}::Possible ${label} detected"
                  FOUND=1
                done <<< "$MATCHES"
              fi
            done
          done <<< "${{ steps.changed.outputs.files }}"

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Credential scan failed: potential secrets found in changed files"
            exit 1
          fi
          echo "Credential scan passed."

      - name: Sensitive content scan
        if: steps.changed.outputs.no_files != 'true'
        env:
          SENSITIVE_PATTERNS: ${{ secrets.SENSITIVE_PATTERNS }}
        run: |
          if [ -z "$SENSITIVE_PATTERNS" ]; then
            echo "No SENSITIVE_PATTERNS secret configured, skipping."
            exit 0
          fi

          FOUND=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            if file "$file" | grep -q "binary"; then
              continue
            fi

            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              # Skip comment lines
              [[ "$pattern" =~ ^# ]] && continue

              MATCHES=$(grep -inE "$pattern" "$file" 2>/dev/null | cut -d: -f1 || true)
              if [ -n "$MATCHES" ]; then
                while IFS= read -r line_num; do
                  echo "::error file=${file},line=${line_num}::Sensitive content detected"
                  FOUND=1
                done <<< "$MATCHES"
              fi
            done <<< "$SENSITIVE_PATTERNS"
          done <<< "${{ steps.changed.outputs.files }}"

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Sensitive content scan failed"
            exit 1
          fi
          echo "Sensitive content scan passed."
